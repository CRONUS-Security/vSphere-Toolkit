name: Build vSphere-Toolkit EXE

on:
    workflow_dispatch:
    # push:
    #     branches:
    #         - main
    #         - master

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest

        steps:
            - name: Checkout current repository
              uses: actions/checkout@v6

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install dependencies
              shell: pwsh
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -r requirements.txt
                  python -m pip install nuitka ordered-set zstandard

            - name: Cache Nuitka depends.exe
              uses: actions/cache@v5
              with:
                  path: ~\AppData\Local\Nuitka\Nuitka\Cache\downloads\depends
                  key: nuitka-depends-x86_64

            - name: Cache Nuitka bytecode
              uses: actions/cache@v5
              with:
                  path: ~\AppData\Local\Nuitka\Nuitka\Cache\bytecode
                  key: nuitka-bytecode-py3.12
                  restore-keys: |
                      nuitka-bytecode-py3.12-

            - name: Build vSphere-Toolkit.exe
              shell: pwsh
              run: |
                  python build.py

            - name: Upload EXE artifact
              uses: actions/upload-artifact@v7
              with:
                  name: vSphere-Toolkit-exe
                  path: .\build\vSphere-Toolkit.exe
                  if-no-files-found: error

    publish-release:
        name: Publish artifacts to Release
        runs-on: ubuntu-latest
        needs: build
        if: ${{ always() && needs.build.result == 'success' }}

        steps:
            - name: Download build artifact
              uses: actions/download-artifact@v8
              with:
                  pattern: vSphere-Toolkit-exe
                  path: release-assets
                  merge-multiple: true

            - name: Update rolling Release assets
              uses: ncipollo/release-action@v1
              with:
                  tag: latest
                  name: vSphere-Toolkit Latest Build
                  body: |
                      Auto-updated by workflow run: ${{ github.run_id }}
                  artifactErrorsFailBuild: true
                  artifacts: release-assets/vSphere-Toolkit.exe
                  allowUpdates: true
                  replacesArtifacts: true
                  makeLatest: true
                  token: ${{ secrets.GITHUB_TOKEN }}
